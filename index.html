<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEV.HJ | Backend Developer Portfolio</title>
  <meta name="description" content="Java 기반 웹 개발 · DB 최적화 · 시스템 통합 전문가 포트폴리오" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="public/css/main.css" />
</head>
<body>

  <!-- ===================== NAVIGATION ===================== -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#hero" class="nav-logo">DEV.HJ</a>

      <ul class="nav-menu" id="navMenu">
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#skills" class="nav-link">Skills</a></li>
        <li><a href="#projects" class="nav-link">Projects</a></li>
        <li><a href="#experience" class="nav-link">Experience</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>
      </ul>

      <button class="hamburger" id="hamburger" aria-label="메뉴 열기">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- ===================== HERO ===================== -->
  <section class="hero" id="hero">
    <div class="hero-bg">
      <div class="grid-pattern"></div>
    </div>
    <div class="hero-content">
      <p class="hero-greeting" id="heroGreeting"></p>
      <h1 class="hero-name" id="heroName"></h1>
      <div class="hero-typing-wrap">
        <span class="hero-typing" id="typingText"></span><span class="cursor">|</span>
      </div>
      <p class="hero-desc" id="heroDesc"></p>
      <div class="hero-btns">
        <a href="#projects" class="btn btn-primary">프로젝트 보기</a>
        <a href="#" id="heroGithubBtn" target="_blank" rel="noopener noreferrer" class="btn btn-outline">GitHub 바로가기</a>
      </div>
    </div>
    <div class="hero-scroll-hint">
      <span></span>
    </div>
  </section>

  <!-- ===================== ABOUT ===================== -->
  <section class="section about" id="about">
    <div class="container">
      <h2 class="section-title fade-in">About <span>Me</span></h2>

      <div class="about-grid fade-in">
        <!-- 프로필 이미지 -->
        <div class="about-img-wrap">
          <div class="profile-circle" id="profileCircle">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-label="프로필 이미지">
              <circle cx="100" cy="100" r="100" fill="#1A2332"/>
              <circle cx="100" cy="82" r="34" fill="#2A3A52"/>
              <ellipse cx="100" cy="165" rx="55" ry="45" fill="#2A3A52"/>
              <circle cx="100" cy="82" r="30" fill="#4A9EBF" opacity="0.3"/>
              <text x="100" y="88" text-anchor="middle" fill="#00D4FF" font-size="36" font-family="Syne" font-weight="700">HJ</text>
            </svg>
          </div>
          <div class="profile-glow"></div>
        </div>

        <!-- 소개 텍스트 (JSON에서 동적 렌더링) -->
        <div class="about-text">
          <p id="aboutDescription"></p>
          <div class="about-cards" id="aboutCards"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===================== SKILLS ===================== -->
  <section class="section skills" id="skills">
    <div class="container">
      <h2 class="section-title fade-in">Tech <span>Stack</span></h2>

      <!-- 카테고리 탭 (JSON에서 동적 렌더링) -->
      <div class="skills-tabs fade-in" id="skillsTabs" role="tablist"></div>

      <!-- 스킬 태그 목록 (JSON에서 동적 렌더링) -->
      <div class="skills-grid fade-in" id="skillsGrid"></div>
    </div>
  </section>

  <!-- ===================== PROJECTS ===================== -->
  <section class="section projects" id="projects">
    <div class="container">
      <h2 class="section-title fade-in">Pro<span>jects</span></h2>

      <!-- 프로젝트 카드 (JSON에서 동적 렌더링) -->
      <div class="projects-grid" id="projectsGrid"></div>
    </div>
  </section>

  <!-- ===================== EXPERIENCE ===================== -->
  <section class="section experience" id="experience">
    <div class="container">
      <h2 class="section-title fade-in">Experi<span>ence</span></h2>

      <!-- 경력 타임라인 (JSON에서 동적 렌더링) -->
      <div class="timeline" id="experienceTimeline"></div>
    </div>
  </section>

  <!-- ===================== CONTACT ===================== -->
  <section class="section contact" id="contact">
    <div class="container">
      <h2 class="section-title fade-in">Con<span>tact</span></h2>
      <p class="contact-sub fade-in">새로운 기회와 협업에 열려있습니다. 언제든지 연락주세요.</p>

      <!-- 연락처 카드 (JSON에서 동적 렌더링) -->
      <div class="contact-cards fade-in" id="contactCards"></div>

      <div class="contact-cta fade-in">
        <a href="#" id="contactCtaBtn" class="btn btn-primary btn-lg">이메일 보내기</a>
      </div>
    </div>
  </section>

  <!-- ===================== FOOTER ===================== -->
  <footer class="footer">
    <p>© 2026 Dev Portfolio. Built with passion.</p>
  </footer>

  <!-- 상단으로 돌아가기 버튼 -->
  <button class="scroll-top" id="scrollTop" aria-label="상단으로 이동">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script type="module" src="public/js/main.js"></script>
</body>
</html>
